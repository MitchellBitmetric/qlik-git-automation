name: Initialiseer nieuwe repo met workflows

on:
  repository:
    types: [created]

jobs:
  init-repo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout automation-repo
        uses: actions/checkout@v4
        with:
          path: automation

      - name: Initialiseer nieuwe repo
        env:
          GH_TOKEN: ${{ secrets.AUTOMATION_PAT }}
          REPO_NAME: ${{ github.event.repository.name }}
          ORG_NAME: ${{ github.organization.login }}
        run: python automation/.github/scripts/init_repo.py
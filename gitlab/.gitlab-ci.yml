# .gitlab-ci.yml
# Automatisch changelog, README en Qlik laadscript bijwerken bij elke Merge Request.
# Na merge naar main: automatisch versienummer ophogen en GitLab Release aanmaken.

stages:
  - automate
  - release

# ──────────────────────────────────────────────
# Stage 1: Draait bij elke Merge Request
# ──────────────────────────────────────────────

mr-automation:
  stage: automate
  image: python:3.11-slim

  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && ($CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main" || $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "master")'

  variables:
    GIT_STRATEGY: clone
    GIT_DEPTH: 0

  before_script:
    - apt-get update -qq && apt-get install -y -qq git
    - pip install google-genai requests --quiet
    - git config user.name  "gitlab-ci-bot"
    - git config user.email "gitlab-ci-bot@users.noreply.gitlab.com"
    - git remote set-url origin "https://oauth2:${GITLAB_API_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
    - git fetch origin "${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME}"
    - git checkout "${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME}"

  script:
    # Stop direct met succes als dit een bot-commit is (voorkomt loop én pipeline-blokkade)
    - |
      if echo "$CI_COMMIT_AUTHOR" | grep -q "gitlab-ci-bot"; then
        echo "Bot-commit gedetecteerd — automation overgeslagen."
        exit 0
      fi
    - python scripts/pr_automation.py
    - |
      git add -A
      if git diff --cached --quiet; then
        echo "Geen wijzigingen om te committen."
      else
        git commit -m "chore: automatisch changelog & docs bijgewerkt via MR !${CI_MERGE_REQUEST_IID}"
        git push origin "${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME}"
      fi


# ──────────────────────────────────────────────
# Stage 2: Draait na merge naar main/master
# ──────────────────────────────────────────────

create-release:
  stage: release
  image: python:3.11-slim

  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_COMMIT_BRANCH == "master" && $CI_PIPELINE_SOURCE == "push"'

  variables:
    GIT_STRATEGY: clone
    GIT_DEPTH: 0

  before_script:
    - apt-get update -qq && apt-get install -y -qq git
    - pip install requests --quiet
    - git config user.name  "gitlab-ci-bot"
    - git config user.email "gitlab-ci-bot@users.noreply.gitlab.com"
    - git remote set-url origin "https://oauth2:${GITLAB_API_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"

  script:
    # Stop direct met succes als dit een bot-commit is
    - |
      if echo "$CI_COMMIT_AUTHOR" | grep -q "gitlab-ci-bot"; then
        echo "Bot-commit gedetecteerd — release-stap overgeslagen."
        exit 0
      fi
    - python scripts/create_release.py
